<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🏓 Pickleball Scramble</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d1f14;
      --bg2: #152a1e;
      --bg3: rgba(255,255,255,0.04);
      --green: #a8e063;
      --green-dim: #5a8a5a;
      --green-pale: #c8e8a8;
      --border: rgba(168,224,99,0.15);
      --text: #e8f4e8;
      --text-dim: #5a8a5a;
      --yellow: #fffde7;
      --red: #ef5350;
      --orange: #ff9800;
    }

    body {
      font-family: Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .topbar-left .title { font-size: 18px; font-weight: bold; color: var(--green); }
    .topbar-left .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      background: transparent; border: none; color: var(--text-dim);
      font-size: 20px; cursor: pointer; padding: 6px;
    }

    /* ── SETUP SCREEN ── */
    #setup-screen { padding: 0 20px 40px; }
    .hero { text-align: center; padding: 48px 0 36px; }
    .hero-emoji { font-size: 52px; margin-bottom: 12px; }
    .hero-title { font-size: 28px; font-weight: bold; color: var(--green); letter-spacing: -0.5px; }
    .hero-sub { font-size: 14px; color: var(--text-dim); margin-top: 6px; }

    .field-label {
      font-size: 11px; font-weight: bold; color: var(--text-dim);
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: block;
    }
    .section { margin-bottom: 28px; }

    input[type="date"], input[type="text"] {
      width: 100%; padding: 14px 16px; font-size: 16px; font-family: Georgia, serif;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(168,224,99,0.25);
      border-radius: 12px; color: var(--text); outline: none;
    }
    input[type="date"]:focus, input[type="text"]:focus {
      border-color: rgba(168,224,99,0.6);
    }

    .pill-row { display: flex; gap: 10px; }
    .pill {
      flex: 1; padding: 16px 0; font-size: 22px; font-weight: bold;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(168,224,99,0.2);
      border-radius: 12px; color: var(--text-dim); cursor: pointer; font-family: Georgia, serif;
      transition: all 0.15s;
    }
    .pill.active { background: var(--green); color: var(--bg); border-color: var(--green); }

    .hint { font-size: 13px; color: var(--text-dim); margin-top: 10px; text-align: center; font-style: italic; }

    .primary-btn {
      display: block; width: 100%; padding: 16px; background: var(--green);
      color: var(--bg); border: none; border-radius: 14px;
      font-size: 15px; font-weight: bold; cursor: pointer; font-family: Georgia, serif;
      transition: opacity 0.15s; margin-top: 8px;
    }
    .primary-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── TRACKER SCREEN ── */
    #tracker-screen { padding-bottom: 40px; }

    .hour-block { padding: 16px 20px 4px; }
    .hour-header {
      font-size: 11px; font-weight: bold; color: var(--green);
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── COURT CARD ── */
    .court-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px; margin-bottom: 10px;
    }
    .card-head {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .court-label { font-size: 16px; font-weight: bold; color: var(--green-pale); }
    .badge {
      font-size: 11px; font-weight: bold; padding: 3px 9px;
      border-radius: 20px; letter-spacing: 0.5px;
    }
    .badge-open { background: rgba(102,187,106,0.15); color: #66bb6a; border: 1px solid rgba(102,187,106,0.3); }
    .badge-warn { background: rgba(255,152,0,0.15); color: var(--orange); border: 1px solid rgba(255,152,0,0.3); }
    .badge-full { background: rgba(239,83,80,0.15); color: var(--red); border: 1px solid rgba(239,83,80,0.3); }

    .info-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 7px; min-height: 32px;
    }
    .info-icon { font-size: 14px; width: 22px; flex-shrink: 0; }
    .info-filled { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .info-val { font-size: 14px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-val { font-size: 14px; color: var(--green); text-decoration: none; flex: 1; }
    .ghost-btn {
      padding: 6px 12px; background: transparent;
      border: 1px dashed rgba(168,224,99,0.3); border-radius: 8px;
      color: var(--text-dim); font-size: 13px; cursor: pointer; font-family: Georgia, serif;
    }
    .x-btn {
      background: transparent; border: none; color: var(--text-dim);
      font-size: 13px; cursor: pointer; padding: 4px; flex-shrink: 0;
    }

    .divider { height: 1px; background: var(--border); margin: 10px 0; }

    .players-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .player-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(168,224,99,0.1); border: 1px solid rgba(168,224,99,0.2);
      border-radius: 20px; padding: 5px 10px;
    }
    .player-name { font-size: 13px; color: var(--green-pale); }
    .chip-x {
      background: transparent; border: none; color: var(--text-dim);
      font-size: 11px; cursor: pointer; padding: 0; line-height: 1;
    }
    .join-btn {
      padding: 5px 14px; background: rgba(168,224,99,0.12);
      border: 1px dashed rgba(168,224,99,0.4); border-radius: 20px;
      color: var(--green); font-size: 13px; font-weight: bold;
      cursor: pointer; font-family: Georgia, serif;
    }

    .add-court-btn {
      display: block; width: calc(100% - 40px); margin: 4px 20px;
      padding: 14px; background: transparent;
      border: 2px dashed rgba(168,224,99,0.25); border-radius: 14px;
      color: var(--text-dim); font-size: 14px; font-weight: bold;
      cursor: pointer; font-family: Georgia, serif;
    }

    .copy-btn {
      display: block; width: calc(100% - 40px); margin: 12px 20px 0;
      padding: 16px; background: var(--green); color: var(--bg);
      border: none; border-radius: 14px; font-size: 15px; font-weight: bold;
      cursor: pointer; font-family: Georgia, serif;
    }

    /* ── BOTTOM SHEET MODAL ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 100; display: flex; align-items: flex-end;
      justify-content: center; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid rgba(168,224,99,0.2);
      border-radius: 20px 20px 0 0; padding: 24px 20px 44px;
      width: 100%; max-width: 480px;
      transform: translateY(100%); transition: transform 0.25s ease;
    }
    .overlay.open .modal { transform: translateY(0); }
    .modal-title { font-size: 18px; font-weight: bold; color: var(--green); margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .modal-row { display: flex; gap: 10px; margin-top: 14px; }
    .cancel-btn {
      flex: 1; padding: 13px; background: transparent;
      border: 1px solid rgba(168,224,99,0.2); border-radius: 12px;
      color: var(--text-dim); font-size: 15px; cursor: pointer; font-family: Georgia, serif;
    }
    .save-btn {
      flex: 1; padding: 13px; background: var(--green);
      border: none; border-radius: 12px; color: var(--bg);
      font-size: 15px; font-weight: bold; cursor: pointer; font-family: Georgia, serif;
    }
    .save-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .danger-btn {
      flex: 1; padding: 13px; background: var(--red);
      border: none; border-radius: 12px; color: white;
      font-size: 15px; font-weight: bold; cursor: pointer; font-family: Georgia, serif;
    }

    /* ── LOADING / STATUS ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 16px;
    }
    .loading-emoji { font-size: 48px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .loading-text { font-size: 15px; color: var(--text-dim); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--green); padding: 10px 20px; border-radius: 30px;
      font-size: 14px; font-weight: bold; z-index: 200;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .sep { height: 6px; background: var(--bg); margin: 4px 0; }

    .live-dot {
      display: inline-block; width: 7px; height: 7px;
      background: var(--green); border-radius: 50%; margin-right: 5px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── SCRAMBLE LIST ── */
    .scramble-card {
      margin: 0 0 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .scramble-card:active { border-color: var(--green); }
    .scramble-card-date { font-size: 17px; font-weight: bold; color: var(--green-pale); }
    .scramble-card-meta { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .status-open   { background: rgba(102,187,106,0.15); color: #66bb6a; border: 1px solid rgba(102,187,106,0.3); }
    .status-closed { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); }
    .empty-state { text-align:center; padding: 80px 20px; color: var(--text-dim); font-size:15px; line-height:1.7; }
    .modal-col { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen" class="loading">
  <div class="loading-emoji">🏓</div>
  <div class="loading-text">Loading scramble...</div>
</div>

<!-- LIST -->
<div id="list-screen" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">🏓 Scramble Tracker</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="goToSetup()" style="font-size:24px; font-weight:bold" title="New Scramble">+</button>
    </div>
  </div>
  <div style="padding: 12px 20px 40px">
    <div id="scramble-list"></div>
    <div id="list-empty" class="empty-state" style="display:none">
      <div style="font-size:44px; margin-bottom:16px">🏓</div>
      No scrambles yet.<br>Tap <strong>+</strong> to create your first one.
    </div>
  </div>
</div>

<!-- SETUP -->
<div id="setup-screen" style="display:none">
  <div class="topbar" style="border:none; padding-bottom:0">
    <button class="icon-btn" onclick="goToList()" style="font-size:15px; color:var(--text-dim)">← Back</button>
    <div></div>
  </div>
  <div class="hero">
    <div class="hero-emoji">🏓</div>
    <div class="hero-title">New Scramble</div>
    <div class="hero-sub">Set up a new court tracker</div>
  </div>

  <div class="section">
    <label class="field-label">Scramble Date</label>
    <input type="date" id="setup-date" />
  </div>

  <div class="section">
    <label class="field-label">Number of Courts</label>
    <div class="pill-row">
      <button class="pill" data-n="2" onclick="selectCourts(2)">2</button>
      <button class="pill active" data-n="3" onclick="selectCourts(3)">3</button>
      <button class="pill" data-n="4" onclick="selectCourts(4)">4</button>
    </div>
    <div class="hint" id="setup-hint">6 people need to book — 3 per hour block</div>
  </div>

  <button class="primary-btn" onclick="createScramble()">Create Tracker →</button>
</div>

<!-- TRACKER -->
<div id="tracker-screen" style="display:none">
  <div class="topbar">
    <div class="topbar-left" style="display:flex; align-items:center; gap:4px">
      <button class="icon-btn" onclick="goToList()" style="font-size:15px; padding:4px 10px 4px 0">←</button>
      <div>
        <div class="title">🏓 Scramble</div>
        <div class="subtitle" id="tracker-date"></div>
      </div>
    </div>
    <div class="topbar-right">
      <span style="font-size:12px;color:var(--text-dim)"><span class="live-dot"></span>Live</span>
      <button class="icon-btn" onclick="openOptionsModal()">⋯</button>
    </div>
  </div>
  <div id="courts-container"></div>
  <div id="waitlist-section"></div>
  <button class="add-court-btn" id="add-court-btn" onclick="addCourt()" style="display:none">+ Add an additional court to both blocks</button>
  <button class="copy-btn" onclick="copyWhatsApp()">📋 Copy summary for WhatsApp</button>
</div>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <input type="text" id="modal-input" placeholder="" style="display:none"
      oninput="document.getElementById('modal-save').disabled=!this.value.trim()"
      onkeydown="if(event.key==='Enter')document.getElementById('modal-save').click()" />
    <div class="modal-row" id="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" id="modal-save" onclick="modalSave()" disabled>Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://xdydgeotmttgnuqmqtyk.supabase.co";
const SUPABASE_KEY = "sb_publishable_i-GqrXN3qZTaU4zjOtYJCQ_kwJ4v2Ns";
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Change this PIN to restrict admin access ──────────────
const ADMIN_PIN = "1234";

const HOURS = ["5:00–6:00 PM", "6:00–7:00 PM"];
const COURT_CAPACITY = 4; // total people per court, booker counts as one

function maxPlayers(court) {
  return COURT_CAPACITY - (court.booker ? 1 : 0);
}
function spotsLeft(court) {
  return Math.max(0, maxPlayers(court) - court.players.length);
}
let state = null;
let modalCallback = null;
let pendingAdminAction = null;
let realtimeChannel = null;
let adminUnlocked = false;

// ── INIT ────────────────────────────────────────────────
async function init() {
  adminUnlocked = sessionStorage.getItem("admin_unlocked") === "true";
  await loadList();
}

// ── LIST ─────────────────────────────────────────────────
async function loadList() {
  showScreen("list-screen");
  const { data } = await db
    .from("scrambles")
    .select("*")
    .order("date", { ascending: false })
    .order("created_at", { ascending: false });

  const listEl  = document.getElementById("scramble-list");
  const emptyEl = document.getElementById("list-empty");
  listEl.innerHTML = "";

  // Filter out soft-deleted records (courts marked with _deleted: true)
  const visible = (data || []).filter(s => !s.courts?.[0]?._deleted);

  if (visible.length === 0) {
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";
  visible.forEach(s => listEl.appendChild(buildScrambleCard(s)));
}

function buildScrambleCard(s) {
  const d = new Date(s.date + "T12:00:00");
  const dateStr = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
  const realCourts    = s.courts.filter(c => c.hour);
  const courtsPerHour = realCourts.filter(c => c.hour === HOURS[0]).length;
  const totalPlayers  = realCourts.reduce((sum, c) => sum + (c.players || []).length, 0);
  const bookersFilled = realCourts.filter(c => c.booker).length;

  const el = document.createElement("div");
  el.className = "scramble-card";
  el.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:flex-start">
      <div class="scramble-card-date">${dateStr}</div>
      <span class="badge ${s.active ? "status-open" : "status-closed"}">
        ${s.active ? '<span class="live-dot" style="margin-right:4px"></span>OPEN' : "CLOSED"}
      </span>
    </div>
    <div class="scramble-card-meta" style="margin-top:6px">
      ${courtsPerHour} court${courtsPerHour !== 1 ? "s" : ""} &nbsp;·&nbsp;
      ${totalPlayers} player${totalPlayers !== 1 ? "s" : ""} &nbsp;·&nbsp;
      ${bookersFilled}/${s.courts.length} booked
    </div>
  `;
  el.onclick = () => openScramble(s);
  return el;
}

function openScramble(s) {
  state = s;
  showTracker();
  subscribeRealtime();
}

// ── NAVIGATION ───────────────────────────────────────────
function showScreen(id) {
  ["loading-screen","list-screen","setup-screen","tracker-screen"]
    .forEach(s => document.getElementById(s).style.display = s === id ? "block" : "none");
}

function goToList() {
  if (realtimeChannel) { db.removeChannel(realtimeChannel); realtimeChannel = null; }
  state = null;
  closeModal();
  loadList();
}

function goToSetup() {
  showScreen("setup-screen");
  // reset setup form
  document.getElementById("setup-date").value = "";
  numCourts = 3;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  document.querySelector('.pill[data-n="3"]').classList.add("active");
  document.getElementById("setup-hint").textContent = "6 people need to book — 3 per hour block";
}

// ── SETUP ────────────────────────────────────────────────
let numCourts = 3;
function selectCourts(n) {
  numCourts = n;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  document.querySelector(`.pill[data-n="${n}"]`).classList.add("active");
  const bookers = n * 2;
  document.getElementById("setup-hint").textContent =
    `${bookers} people need to book — ${n} per hour block`;
}

async function createScramble() {
  const date = document.getElementById("setup-date").value;
  if (!date) return;

  const courts = [];
  HOURS.forEach(hour => {
    for (let i = 1; i <= numCourts; i++) {
      courts.push({ hour, label: `Court ${i}`, booker: "", link: "", players: [], waitlist: [] });
    }
  });

  const { data, error } = await db
    .from("scrambles")
    .insert({ date, courts, active: true })
    .select()
    .single();

  if (error) { showToast("❌ Error creating scramble"); console.error(error); return; }
  state = data;
  showTracker();
  subscribeRealtime();
}

// ── REALTIME ─────────────────────────────────────────────
function subscribeRealtime() {
  if (realtimeChannel) db.removeChannel(realtimeChannel);
  realtimeChannel = db
    .channel("scramble-" + state.id)
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "scrambles", filter: `id=eq.${state.id}` },
      (payload) => { state = payload.new; renderCourts(); })
    .subscribe();
}

// ── SAVE ─────────────────────────────────────────────────
async function saveState() {
  const { error } = await db
    .from("scrambles")
    .update({ courts: state.courts })
    .eq("id", state.id);
  if (error) { showToast("❌ Save failed"); console.error(error); }
}

// ── TRACKER RENDER ───────────────────────────────────────
function showTracker() {
  showScreen("tracker-screen");
  const d = new Date(state.date + "T12:00:00");
  const dateStr = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  document.getElementById("tracker-date").innerHTML =
    dateStr + (state.active ? "" : ' <span style="color:var(--text-dim);font-size:11px">· CLOSED</span>');
  renderCourts();
}

function renderCourts() {
  const container = document.getElementById("courts-container");
  container.innerHTML = "";
  const actualCourts = state.courts.filter(c => c.hour); // exclude waitlist entry
  const courtsPerHour = actualCourts.filter(c => c.hour === HOURS[0]).length;

  HOURS.forEach((hour, hi) => {
    const block = document.createElement("div");
    block.className = "hour-block";
    block.innerHTML = `<div class="hour-header">${hour}</div>`;
    actualCourts.filter(c => c.hour === hour).forEach(court => {
      const globalIdx = state.courts.findIndex(c => c.hour === hour && c.label === court.label);
      block.appendChild(buildCourtCard(court, globalIdx));
    });
    container.appendChild(block);
    if (hi < HOURS.length - 1) {
      const sep = document.createElement("div"); sep.className = "sep";
      container.appendChild(sep);
    }
  });

  renderWaitlist();
  const waitlist = getWaitlist();
  document.getElementById("add-court-btn").style.display =
    (courtsPerHour < 4 && waitlist.length >= 4) ? "block" : "none";
}

function buildCourtCard(court, idx) {
  const spots = spotsLeft(court);
  const full   = spots === 0;
  const badgeClass = full ? "badge-full" : spots === 1 ? "badge-warn" : "badge-open";
  const badgeText  = full ? "FULL" : `${spots} spot${spots !== 1 ? "s" : ""} open`;

  const card = document.createElement("div");
  card.className = "court-card";
  card.innerHTML = `
    <div class="card-head">
      <span class="court-label">${court.label}</span>
      <div style="display:flex; align-items:center; gap:8px">
        <span class="badge ${badgeClass}">${badgeText}</span>
        <button class="x-btn" style="font-size:15px; color:var(--text-dim)" title="Remove court"
          onclick="deleteCourtPrompt('${court.label}')">🗑</button>
      </div>
    </div>
    <div class="info-row">
      <span class="info-icon">👤</span>
      ${court.booker
        ? `<div class="info-filled">
             <span class="info-val">${esc(court.booker)}</span>
             <button class="x-btn" onclick="clearField(${idx},'booker')">✕</button>
           </div>`
        : `<button class="ghost-btn" onclick="openFieldModal(${idx},'booker','Who\\'s booking?','Name')">+ Add booker</button>`}
    </div>
    <div class="info-row">
      <span class="info-icon">🔗</span>
      ${court.link
        ? `<div class="info-filled">
             <a href="${esc(court.link)}" target="_blank" class="link-val">Open reservation ↗</a>
             <button class="x-btn" onclick="clearField(${idx},'link')">✕</button>
           </div>`
        : `<button class="ghost-btn" onclick="openFieldModal(${idx},'link','Paste reservation link','https://...')">+ Paste link</button>`}
    </div>
    <div class="divider"></div>
    <div class="players-grid">
      ${court.players.map((p, pi) => `
        <div class="player-chip">
          <span class="player-name">${esc(p)}</span>
          <button class="chip-x" onclick="removePlayer(${idx},${pi})">✕</button>
        </div>`).join("")}
      ${!full ? `<button class="join-btn" onclick="openJoinModal(${idx})">+ Join</button>` : ""}
    </div>
  `;
  return card;
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── ACTIONS ───────────────────────────────────────────────
function clearField(idx, field) {
  state.courts[idx][field] = "";
  saveState(); renderCourts();
}
function removePlayer(idx, pi) {
  state.courts[idx].players.splice(pi, 1);
  saveState(); renderCourts();
}
async function addCourt() {
  const newCourts = [...state.courts];
  HOURS.forEach(hour => {
    const existing = newCourts.filter(c => c.hour === hour).length;
    newCourts.push({ hour, label: `Court ${existing + 1}`, booker: "", link: "", players: [], waitlist: [] });
  });
  state.courts = newCourts;
  await saveState();
  renderCourts();
  const count = state.courts.filter(c => c.hour === HOURS[0]).length;
  showToast(`Court ${count} added to both blocks!`);
}

function deleteCourtPrompt(label) {
  requireAdmin(() => confirmDeleteCourt(label));
}
function confirmDeleteCourt(label) {
  document.getElementById("modal-title").textContent = `Remove ${label}?`;
  document.getElementById("modal-sub").textContent = "This removes it from both hour blocks.";
  document.getElementById("modal-input").style.display = "none";
  document.getElementById("modal-btns").className = "modal-row";
  document.getElementById("modal-btns").innerHTML = `
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    <button class="danger-btn" onclick="deleteCourt('${label}')">Remove Court</button>
  `;
  openModal();
}
async function deleteCourt(label) {
  state.courts = state.courts.filter(c => c.label !== label);
  await saveState();
  closeModal();
  renderCourts();
  showToast(`${label} removed from both blocks`);
}

// ── GLOBAL WAITLIST ───────────────────────────────────────
function getWaitlist() {
  const entry = state.courts.find(c => c._type === "waitlist");
  return entry ? (entry.players || []) : [];
}
function setWaitlist(players) {
  const idx = state.courts.findIndex(c => c._type === "waitlist");
  if (idx >= 0) state.courts[idx].players = players;
  else state.courts.push({ _type: "waitlist", players });
}

function renderWaitlist() {
  const waitlist = getWaitlist();
  const section = document.getElementById("waitlist-section");
  const hint = waitlist.length >= 4
    ? `<div style="font-size:13px;color:var(--orange);font-style:italic;margin-top:8px">
         4+ waiting — tap "Add an additional court" below!
       </div>`
    : waitlist.length === 0
      ? `<div style="font-size:13px;color:var(--text-dim);font-style:italic">
           Courts are full? Add your name here.
         </div>`
      : "";
  section.innerHTML = `
    <div style="padding:16px 20px 8px">
      <div style="font-size:11px;font-weight:bold;color:var(--text-dim);letter-spacing:1.5px;
                  text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;
                  border-bottom:1px solid var(--border)">
        ⏳ Waitlist${waitlist.length ? " · " + waitlist.length + " waiting" : ""}
      </div>
      <div class="players-grid">
        ${waitlist.map((p, wi) => `
          <div class="player-chip" style="border-color:rgba(255,152,0,0.3);background:rgba(255,152,0,0.08)">
            <span class="player-name" style="color:var(--orange)">${esc(p)}</span>
            <button class="chip-x" onclick="removeWaitlister(${wi})">✕</button>
          </div>`).join("")}
        <button class="join-btn" style="border-color:rgba(255,152,0,0.4);color:var(--orange)"
          onclick="openWaitlistModal()">+ Join Waitlist</button>
      </div>
      ${hint}
    </div>
  `;
}

function removeWaitlister(wi) {
  const list = getWaitlist();
  list.splice(wi, 1);
  setWaitlist(list);
  saveState(); renderCourts();
}

function openWaitlistModal() {
  const waitlist = getWaitlist();
  document.getElementById("modal-title").textContent = "Join Waitlist";
  document.getElementById("modal-sub").textContent =
    `${waitlist.length} already waiting — you'll be next in line for a new court`;
  const input = document.getElementById("modal-input");
  input.style.display = "block";
  input.placeholder = "Your name";
  input.value = "";
  input.dispatchEvent(new Event("input"));
  document.getElementById("modal-btns").className = "modal-row";
  document.getElementById("modal-btns").innerHTML = `
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    <button class="save-btn" id="modal-save" onclick="modalSave()" disabled>Join Waitlist</button>
  `;
  input.oninput = () => document.getElementById("modal-save").disabled = !input.value.trim();
  modalCallback = (val) => {
    const list = getWaitlist();
    list.push(val);
    setWaitlist(list);
    saveState(); renderCourts();
  };
  openModal();
  setTimeout(() => input.focus(), 300);
}

// ── ADMIN AUTH ────────────────────────────────────────────
function requireAdmin(action) {
  if (adminUnlocked) { action(); return; }
  pendingAdminAction = action;
  openPinModal();
}

function openPinModal() {
  document.getElementById("modal-title").textContent = "Admin Access";
  document.getElementById("modal-sub").textContent = "Enter PIN to continue.";
  const input = document.getElementById("modal-input");
  input.type = "password";
  input.style.display = "block";
  input.placeholder = "PIN";
  input.value = "";
  input.dispatchEvent(new Event("input"));
  document.getElementById("modal-btns").className = "modal-row";
  document.getElementById("modal-btns").innerHTML = `
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    <button class="save-btn" id="modal-save" onclick="submitPin()" disabled>Unlock</button>
  `;
  input.oninput = () => document.getElementById("modal-save").disabled = !input.value.trim();
  modalCallback = null;
  openModal();
  setTimeout(() => input.focus(), 300);
}

function submitPin() {
  const val = document.getElementById("modal-input").value;
  if (val === ADMIN_PIN) {
    adminUnlocked = true;
    sessionStorage.setItem("admin_unlocked", "true");
    closeModal();
    if (pendingAdminAction) { const fn = pendingAdminAction; pendingAdminAction = null; fn(); }
  } else {
    showToast("❌ Incorrect PIN");
    document.getElementById("modal-input").value = "";
  }
}

// ── OPTIONS MODAL (admin-gated) ───────────────────────────
function openOptionsModal() {
  requireAdmin(showAdminOptions);
}

function showAdminOptions() {
  document.getElementById("modal-title").textContent = "Admin Options";
  document.getElementById("modal-sub").textContent = "";
  document.getElementById("modal-input").style.display = "none";
  document.getElementById("modal-btns").className = "modal-col";
  document.getElementById("modal-btns").innerHTML = `
    <button class="save-btn" onclick="toggleScrambleStatus()">
      ${state.active ? "Close Scramble" : "Reopen Scramble"}
    </button>
    <button class="danger-btn" onclick="confirmDelete()">Delete Scramble</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
  `;
  modalCallback = null;
  openModal();
}

async function toggleScrambleStatus() {
  const newActive = !state.active;
  await db.from("scrambles").update({ active: newActive }).eq("id", state.id);
  state.active = newActive;
  closeModal();
  showTracker();
  showToast(newActive ? "✅ Scramble reopened" : "✅ Scramble closed");
}

function confirmDelete() {
  document.getElementById("modal-title").textContent = "Delete Scramble?";
  document.getElementById("modal-sub").textContent = "This cannot be undone.";
  document.getElementById("modal-btns").className = "modal-row";
  document.getElementById("modal-btns").innerHTML = `
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    <button class="danger-btn" onclick="deleteScramble()">Delete Forever</button>
  `;
  openModal();
}

async function deleteScramble() {
  const id = state.id;
  // Soft-delete: mark the record in Supabase so it's hidden for everyone.
  // We use update (not delete) because Supabase RLS may block hard deletes
  // for the publishable anon key, but updates already work fine.
  const { error } = await db.from("scrambles")
    .update({ courts: [{ _deleted: true }], active: false })
    .eq("id", id);
  if (error) { showToast("❌ Delete failed"); console.error(error); closeModal(); return; }

  if (realtimeChannel) { db.removeChannel(realtimeChannel); realtimeChannel = null; }
  state = null;
  closeModal();
  showToast("🗑️ Scramble deleted");
  loadList();
}

// ── MODAL HELPERS ─────────────────────────────────────────
function openFieldModal(idx, field, title, placeholder) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-sub").textContent = `${state.courts[idx].hour} · ${state.courts[idx].label}`;
  const input = document.getElementById("modal-input");
  input.style.display = "block";
  input.placeholder = placeholder;
  input.value = state.courts[idx][field] || "";
  input.dispatchEvent(new Event("input"));
  document.getElementById("modal-btns").className = "modal-row";
  document.getElementById("modal-btns").innerHTML = `
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    <button class="save-btn" id="modal-save" onclick="modalSave()" ${input.value.trim() ? "" : "disabled"}>Save</button>
  `;
  input.oninput = () => document.getElementById("modal-save").disabled = !input.value.trim();
  modalCallback = (val) => { state.courts[idx][field] = val; saveState(); renderCourts(); };
  openModal();
  setTimeout(() => input.focus(), 300);
}

function openJoinModal(idx) {
  const court = state.courts[idx];
  const spots = spotsLeft(court);
  document.getElementById("modal-title").textContent = "Add your name";
  document.getElementById("modal-sub").textContent =
    `${court.hour} · ${court.label} · ${spots} spot${spots !== 1 ? "s" : ""} open`;
  const input = document.getElementById("modal-input");
  input.style.display = "block";
  input.placeholder = "Your name";
  input.value = "";
  input.dispatchEvent(new Event("input"));
  document.getElementById("modal-btns").className = "modal-row";
  document.getElementById("modal-btns").innerHTML = `
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    <button class="save-btn" id="modal-save" onclick="modalSave()" disabled>Join</button>
  `;
  input.oninput = () => document.getElementById("modal-save").disabled = !input.value.trim();
  modalCallback = (val) => {
    if (spotsLeft(state.courts[idx]) <= 0) return;
    state.courts[idx].players.push(val);
    saveState(); renderCourts();
  };
  openModal();
  setTimeout(() => input.focus(), 300);
}

function openModal()  { document.getElementById("modal-overlay").classList.add("open"); }
function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  const input = document.getElementById("modal-input");
  input.type = "text";
  modalCallback = null;
  pendingAdminAction = null;
}
function modalSave() {
  const val = document.getElementById("modal-input").value.trim();
  if (!val || !modalCallback) return;
  modalCallback(val);
  closeModal();
}

// ── WHATSAPP COPY ─────────────────────────────────────────
function copyWhatsApp() {
  let txt = `🏓 PICKLEBALL SCRAMBLE — ${state.date}\n\n`;
  HOURS.forEach(hour => {
    txt += `⏰ ${hour}\n`;
    state.courts.filter(c => c.hour === hour).forEach(c => {
      const spots = spotsLeft(c);
      txt += `  ${c.label}${c.booker ? ` (${c.booker})` : ""} — ${spots} spot${spots !== 1 ? "s" : ""} open\n`;
      if (c.link)    txt += `  🔗 ${c.link}\n`;
      if (c.players.length) txt += `  👥 ${c.players.join(", ")}\n`;
    });
    txt += "\n";
  });
  const waitlist = getWaitlist();
  if (waitlist.length) txt += `⏳ Waitlist: ${waitlist.join(", ")}\n\n`;
  txt += "👉 Join ONE court per hour block to get in the door!";
  navigator.clipboard.writeText(txt).then(() => showToast("✅ Copied for WhatsApp!"));
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── START ─────────────────────────────────────────────────
init();
</script>
